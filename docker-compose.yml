services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: registration
    ports:
      - "5433:5432"   # 5433 on the host: local Homebrew Postgres already owns 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 20

  # One-shot job that creates the "registration" bucket. MinIO doesn't
  # auto-create buckets, and the API's MinIO reachability probe only checks
  # TCP connectivity (not bucket existence) before deciding to use MinIO
  # over the local-disk fallback — so `api` waits for this job to finish
  # before starting, or it would talk to MinIO against a bucket that isn't
  # there yet.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/registration &&
      exit 0
      "

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/registration?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
      SEED_DIR: /seed
      WEB_DIR: /web
      UPLOADS_DIR: /app/uploads
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000   # what presigned URLs point at — must be reachable by clients
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: registration
      MINIO_USE_SSL: "false"
      BASE_URL: http://localhost:8080
      WEBHOOK_SECRET: dev-webhook-secret
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./seed:/seed:ro
      - ./web:/web:ro
      - uploads:/app/uploads

volumes:
  pgdata:
  miniodata:
  uploads:
